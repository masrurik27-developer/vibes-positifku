name: 🚀 Build Android APK & AAB

# ─────────────────────────────────────────────────────────────
# TRIGGER: Jalankan manual dari tab Actions di GitHub
# ─────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:

      enable_ads:
        description: "Aktifkan Google Ads (AdMob)?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      enable_billing:
        description: "Aktifkan In-App Purchase / Billing?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

      version_name:
        description: "Versi aplikasi (contoh: 1.0.0)"
        required: true
        default: "1.0.0"
        type: string

      build_notes:
        description: "Catatan build (opsional)"
        required: false
        default: ""
        type: string

# ─────────────────────────────────────────────────────────────
# Variabel global yang dipakai semua job
# ─────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: "17"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1: Persiapan — Toggle fitur Ads & Billing
  # ═══════════════════════════════════════════════════════════
  prepare:
    name: ⚙️ Persiapan & Toggle Fitur
    runs-on: ubuntu-latest

    outputs:
      # Output yang dikirim ke job berikutnya
      ads_enabled:     ${{ steps.toggle.outputs.ads_enabled }}
      billing_enabled: ${{ steps.toggle.outputs.billing_enabled }}
      version_code:    ${{ steps.version.outputs.version_code }}
      version_name:    ${{ steps.version.outputs.version_name }}

    steps:
      - name: 📥 Checkout kode
        uses: actions/checkout@v4

      # ── Hitung version code otomatis dari timestamp ──
      - name: 🔢 Set version code & name
        id: version
        run: |
          VERSION_CODE=$(date +%Y%m%d%H%M)
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME"  >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION_NAME ($VERSION_CODE)"

      # ── Toggle Ads: comment/uncomment kode & dependency ──
      - name: 🎯 Toggle Google Ads (AdMob)
        id: toggle_ads
        run: |
          ENABLE="${{ github.event.inputs.enable_ads }}"
          echo "🎯 Ads = $ENABLE"

          if [ "$ENABLE" = "false" ]; then
            echo "⛔ Menonaktifkan Ads — comment kode & dependency..."

            # Comment dependency di build.gradle.kts
            # Mencari baris yang mengandung 'play-services-ads' dan menambahkan //
            find . -name "build.gradle.kts" -o -name "build.gradle" | while read f; do
              # Comment dependency ads
              sed -i 's|^\(\s*\)implementation.*play-services-ads.*$|\1// [ADS-DISABLED] &|g' "$f"
              sed -i 's|^\(\s*\)implementation.*ads-identifier.*$|\1// [ADS-DISABLED] &|g' "$f"
              echo "   Processed: $f"
            done

            # Comment import AdMob di Kotlin/Java files
            find . -name "*.kt" -o -name "*.java" | grep -v "build/" | grep -v ".git/" | while read f; do
              sed -i 's|^\(import com\.google\.android\.gms\.ads\)|// [ADS-DISABLED] \1|g' "$f"
              sed -i 's|^\(import com\.google\.android\.gms\.ads.*\)|// [ADS-DISABLED] \1|g' "$f"
            done

            # Comment blok ADS di Kotlin (antara // ADS_START dan // ADS_END)
            python3 << 'PYEOF'
          import os, re

          ADS_BLOCK_PATTERN = re.compile(
              r'(// ADS_START.*?// ADS_END)',
              re.DOTALL
          )

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['build', '.git', '.gradle']]
              for fname in files:
                  if fname.endswith(('.kt', '.java', '.xml')):
                      path = os.path.join(root, fname)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                          if '// ADS_START' in content:
                              def comment_block(m):
                                  block = m.group(1)
                                  lines = block.split('\n')
                                  commented = ['// [ADS-OFF] ' + l if not l.strip().startswith('//') else l for l in lines]
                                  return '\n'.join(commented)
                              new_content = ADS_BLOCK_PATTERN.sub(comment_block, content)
                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(new_content)
                              print(f'  Commented ADS block: {path}')
                      except Exception as e:
                          print(f'  Skip {path}: {e}')
          PYEOF

            echo "⛔ Ads DINONAKTIFKAN"
          else
            echo "✅ Ads AKTIF — tidak ada perubahan"
          fi

      - name: 💳 Toggle In-App Billing
        id: toggle_billing
        run: |
          ENABLE="${{ github.event.inputs.enable_billing }}"
          echo "💳 Billing = $ENABLE"

          if [ "$ENABLE" = "false" ]; then
            echo "⛔ Menonaktifkan Billing — comment kode & dependency..."

            # Comment dependency billing di gradle
            find . -name "build.gradle.kts" -o -name "build.gradle" | while read f; do
              sed -i 's|^\(\s*\)implementation.*billing.*$|\1// [BILLING-DISABLED] &|g' "$f"
              sed -i 's|^\(\s*\)implementation.*purchase.*$|\1// [BILLING-DISABLED] &|g' "$f"
              echo "   Processed: $f"
            done

            # Comment import billing di Kotlin/Java
            find . -name "*.kt" -o -name "*.java" | grep -v "build/" | grep -v ".git/" | while read f; do
              sed -i 's|^\(import com\.android\.billingclient.*\)|// [BILLING-DISABLED] \1|g' "$f"
              sed -i 's|^\(import com\.google\.android\.gms.*billing.*\)|// [BILLING-DISABLED] \1|g' "$f"
            done

            # Comment blok BILLING di Kotlin (antara // BILLING_START dan // BILLING_END)
            python3 << 'PYEOF'
          import os, re

          BILLING_BLOCK_PATTERN = re.compile(
              r'(// BILLING_START.*?// BILLING_END)',
              re.DOTALL
          )

          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['build', '.git', '.gradle']]
              for fname in files:
                  if fname.endswith(('.kt', '.java', '.xml')):
                      path = os.path.join(root, fname)
                      try:
                          with open(path, 'r', encoding='utf-8') as f:
                              content = f.read()
                          if '// BILLING_START' in content:
                              def comment_block(m):
                                  block = m.group(1)
                                  lines = block.split('\n')
                                  commented = ['// [BILLING-OFF] ' + l if not l.strip().startswith('//') else l for l in lines]
                                  return '\n'.join(commented)
                              new_content = BILLING_BLOCK_PATTERN.sub(comment_block, content)
                              with open(path, 'w', encoding='utf-8') as f:
                                  f.write(new_content)
                              print(f'  Commented BILLING block: {path}')
                      except Exception as e:
                          print(f'  Skip {path}: {e}')
          PYEOF

            echo "⛔ Billing DINONAKTIFKAN"
          else
            echo "✅ Billing AKTIF — tidak ada perubahan"
          fi

      # ── Simpan outputs ──
      - name: 📋 Simpan hasil toggle ke output
        id: toggle
        run: |
          echo "ads_enabled=${{ github.event.inputs.enable_ads }}"         >> $GITHUB_OUTPUT
          echo "billing_enabled=${{ github.event.inputs.enable_billing }}" >> $GITHUB_OUTPUT

      # ── Simpan kode yang sudah dimodifikasi sebagai artifact ──
      - name: 📦 Simpan kode setelah toggle
        uses: actions/upload-artifact@v4
        with:
          name: source-after-toggle
          path: |
            .
            !.git
            !.gradle
            !build
            !**/build
          retention-days: 1

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Build Debug APK (untuk testing cepat)
  # ═══════════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: 📥 Download kode setelah toggle
        uses: actions/download-artifact@v4
        with:
          name: source-after-toggle
          path: .

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: 🔑 Beri izin gradlew
        run: chmod +x gradlew

      - name: 🔧 Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: 🔨 Build Debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }}

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-v${{ needs.prepare.outputs.version_name }}
          path: app/build/outputs/apk/debug/**.apk
          retention-days: 7

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Build Release APK & AAB (signed, siap distribusi)
  # ═══════════════════════════════════════════════════════════
  build-release:
    name: 📦 Build Release APK & AAB
    runs-on: ubuntu-latest
    needs: prepare

    steps:
      - name: 📥 Download kode setelah toggle
        uses: actions/download-artifact@v4
        with:
          name: source-after-toggle
          path: .

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: 🔑 Beri izin gradlew
        run: chmod +x gradlew

      - name: 🔧 Setup google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: 🔐 Decode keystore dari secret
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 --decode > app/release.jks
          echo "✅ Keystore berhasil di-decode"

      - name: 🔍 Verifikasi keystore
        run: |
          keytool -list -keystore app/release.jks \
            -storepass "${{ secrets.SIGNING_STORE_PASSWORD }}" \
            -noprompt \
          && echo "✅ Keystore valid" \
          || echo "⚠️ Keystore perlu dicek"

      # ── Build Release APK ──
      - name: 📱 Build Release APK
        env:
          SIGNING_KEY_ALIAS:     ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:  ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }} \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.jks" \
            -Pandroid.injected.signing.store.password="$SIGNING_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SIGNING_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SIGNING_KEY_PASSWORD"

      # ── Build Release AAB (untuk Play Store) ──
      - name: 📦 Build Release AAB
        env:
          SIGNING_KEY_ALIAS:      ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD:   ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            --no-daemon \
            --stacktrace \
            -Pversion.name=${{ needs.prepare.outputs.version_name }} \
            -Pversion.code=${{ needs.prepare.outputs.version_code }} \
            -Pandroid.injected.signing.store.file="$(pwd)/app/release.jks" \
            -Pandroid.injected.signing.store.password="$SIGNING_STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$SIGNING_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$SIGNING_KEY_PASSWORD"

      # ── Rename file agar jelas versinya ──
      - name: 🏷️ Rename output files
        run: |
          VERSION="${{ needs.prepare.outputs.version_name }}"
          ADS="${{ needs.prepare.outputs.ads_enabled }}"
          BILLING="${{ needs.prepare.outputs.billing_enabled }}"
          SUFFIX="v${VERSION}_ads-${ADS}_billing-${BILLING}"

          mkdir -p release-output

          # Copy & rename APK
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_SRC" ]; then
            cp "$APK_SRC" "release-output/app-release-${SUFFIX}.apk"
            echo "✅ APK: app-release-${SUFFIX}.apk"
          fi

          # Copy & rename AAB
          AAB_SRC=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -n "$AAB_SRC" ]; then
            cp "$AAB_SRC" "release-output/app-release-${SUFFIX}.aab"
            echo "✅ AAB: app-release-${SUFFIX}.aab"
          fi

          echo ""
          echo "📋 Semua output:"
          ls -lh release-output/

      # ── Upload APK ──
      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-APK-v${{ needs.prepare.outputs.version_name }}-ads${{ needs.prepare.outputs.ads_enabled }}-billing${{ needs.prepare.outputs.billing_enabled }}
          path: release-output/*.apk
          retention-days: 30

      # ── Upload AAB ──
      - name: 📤 Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-AAB-v${{ needs.prepare.outputs.version_name }}-ads${{ needs.prepare.outputs.ads_enabled }}-billing${{ needs.prepare.outputs.billing_enabled }}
          path: release-output/*.aab
          retention-days: 30

      # ── Hapus keystore setelah selesai (keamanan) ──
      - name: 🗑️ Hapus keystore dari runner
        if: always()
        run: rm -f app/release.jks

  # ═══════════════════════════════════════════════════════════
  # JOB 4: Ringkasan Build
  # ═══════════════════════════════════════════════════════════
  summary:
    name: 📋 Ringkasan Build
    runs-on: ubuntu-latest
    needs: [prepare, build-debug, build-release]
    if: always()

    steps:
      - name: 📋 Tulis ringkasan ke GitHub Summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # ✨ Build Selesai — Vibes Positif+

          ## 📦 Informasi Build
          | Info | Nilai |
          |------|-------|
          | 📱 Versi | ${{ needs.prepare.outputs.version_name }} (${{ needs.prepare.outputs.version_code }}) |
          | 🎯 Google Ads | ${{ needs.prepare.outputs.ads_enabled == 'true' && '✅ Aktif' || '⛔ Nonaktif' }} |
          | 💳 In-App Billing | ${{ needs.prepare.outputs.billing_enabled == 'true' && '✅ Aktif' || '⛔ Nonaktif' }} |
          | 📝 Catatan | ${{ github.event.inputs.build_notes || '-' }} |
          | 🕐 Waktu Build | $(date '+%d %B %Y, %H:%M UTC') |
          | 👤 Dijalankan oleh | ${{ github.actor }} |

          ## 📥 Download Artifact
          Buka tab **Actions → workflow ini → scroll ke bawah → Artifacts**

          | File | Kegunaan |
          |------|----------|
          | \`release-APK-*\` | Install langsung di HP Android |
          | \`release-AAB-*\` | Upload ke Google Play Store |
          | \`debug-apk-*\` | Testing internal |

          ## ⚙️ Status Job
          | Job | Status |
          |-----|--------|
          | Prepare & Toggle | ${{ needs.prepare.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |
          | Build Debug APK | ${{ needs.build-debug.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |
          | Build Release APK & AAB | ${{ needs.build-release.result == 'success' && '✅ Berhasil' || '❌ Gagal' }} |
          EOF
